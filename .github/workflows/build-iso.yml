name: Build ISO

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install live-build
        run: sudo apt-get update && sudo apt-get install -y live-build

      - name: Run tests first
        run: |
          pip install pynacl zeroconf opencv-python-headless aiohttp numpy pytest pytest-asyncio
          python -m pytest citizenry/tests/ armos/tests/ -q --tb=short

      - name: Build ISO
        run: sudo ./image/build.sh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            image/live-build/*.hybrid.iso
            image/live-build/*.sha256
